services:
  - type: web
    name: coffee-shop-insights
    runtime: python
    buildCommand: pip install -r requirements.txt && python generate_data.py && python db.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
    region: oregon
